<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morse Code Receiving Trainer</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <main class="app">

    <!-- Settings Panel -->
    <section class="panel settings-panel">
      <fieldset>
        <legend>Timing</legend>

        <label>
          Dot length (ms)
          <input type="number" id="dot-length" min="40" max="500" step="10" value="200" />
        </label>
      </fieldset>

      <fieldset>
        <legend>Message Structure</legend>

        <label>
          Characters per word
          <input type="range" id="word-length" min="1" max="10" value="5" />
          <span id="word-length-display">5</span>
        </label>

        <label>
          Number of words
          <input type="range" id="word-count" min="1" max="20" value="10" />
          <span id="word-count-display">10</span>
        </label>
      </fieldset>

      <fieldset>
        <legend>Character Sets</legend>

        <label>
          <input type="checkbox" id="enable-letters" checked />
          Letters (A–Z)
        </label>

        <label>
          <input type="checkbox" id="enable-numbers" />
          Numbers (0–9)
        </label>

        <!--
        <label>
          <input type="checkbox" id="enable-prosigns" />
          Prosigns (AR, BT, SK)
        </label>
        -->
      </fieldset>
    </section>

    <!-- Signal Display -->
    <section class="panel signal-panel">
      <div id="signal-light" aria-label="Morse signal light" role="status"></div>

      <p id="status-text">Not Transmitting</p>

    </section>


    <!-- Message Reveal -->
    <section class="panel reveal-panel">
      <pre id="message-output" hidden></pre>
    </section>

    <!-- Controls -->
    <section class="panel controls-panel">
      <button id="start-button">Start Transmission</button>
      <button id="reveal-button" disabled>Reveal Message</button>
      <button id="reset-button">Reset</button>
    </section>

  </main>

  <script src="app.js"></script>
</body>

</html>
